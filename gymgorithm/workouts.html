<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Workout Plan - Gymgorithm</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      min-height: 100vh;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .workout-day {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .exercise-list {
      margin-top: 15px;
    }
    
    .exercise {
      padding: 12px;
      background: rgba(0,0,0,0.2);
      margin-bottom: 8px;
      border-radius: 5px;
      display: flex;
      align-items: center;
    }
    
    .exercise:before {
      content: "•";
      margin-right: 10px;
      color: #00d9ff;
    }
    
    .nutrition-card {
      background: rgba(0,217,255,0.1);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      border: 1px solid rgba(0,217,255,0.2);
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d9ff;
    }
    
    h2 {
      margin-bottom: 10px;
      color: #00d9ff;
    }
    
    h3 {
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 5px;
    }
    
    .meta-info {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }
    
    .meta-item {
      background: rgba(0,0,0,0.2);
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 14px;
    }
    
    @media (max-width: 600px) {
      .meta-info {
        flex-direction: column;
        gap: 10px;
      }
    }

    .back-button {
  display: inline-block;
  margin-bottom: 20px;
  color: #ffffff;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  transition: color 0.2s ease;
}

.back-button i {
  margin-right: 8px;
}

.back-button:hover {
  color: #cccccc;
  text-decoration: underline;
}

  </style>
</head>
<body>
  <div class="container">
    <h1>Your Personalized Workout Plan</h1>
    <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

    <div class="nutrition-card">
      <h2>Nutrition Recommendations</h2>
      <div id="nutritionInfo">
        <!-- Will be filled by JavaScript -->
      </div>
    </div>
    
    <div id="workoutPlanContainer">
      <!-- Workout days will be inserted here -->
    </div>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // This function should be in workout.html since it's used to display the plan
    function calculateNutrition(profile) {
      // Calculate BMR using Mifflin-St Jeor Equation
      let bmr;
      if (profile.gender === 'male') {
        bmr = 10 * profile.weight + 6.25 * profile.height - 5 * profile.age + 5;
      } else {
        bmr = 10 * profile.weight + 6.25 * profile.height - 5 * profile.age - 161;
      }

      // Adjust for activity level
      const activityMultipliers = {
        'sedentary': 1.2,
        'lightly-active': 1.375,
        'moderately-active': 1.55,
        'very-active': 1.725,
        'extra-active': 1.9
      };
      
      const tdee = bmr * activityMultipliers[profile.activityLevel];

      // Adjust for goals
      let calorieRecommendation;
      let proteinRecommendation;
      
      switch(profile.preferences.goal) {
        case 'weight-loss':
          calorieRecommendation = tdee * 0.85; // 15% deficit
          proteinRecommendation = 2.2 * profile.weight;
          break;
        case 'muscle-gain':
          calorieRecommendation = tdee * 1.1; // 10% surplus
          proteinRecommendation = 2.0 * profile.weight;
          break;
        case 'strength-training':
          calorieRecommendation = tdee; // maintenance
          proteinRecommendation = 1.8 * profile.weight;
          break;
        default:
          calorieRecommendation = tdee;
          proteinRecommendation = 1.6 * profile.weight;
      }

      return {
        calories: Math.round(calorieRecommendation),
        protein: Math.round(proteinRecommendation),
        carbs: Math.round((calorieRecommendation * 0.45) / 4),
        fats: Math.round((calorieRecommendation * 0.3) / 9)
      };
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          const userData = userDoc.data();
          
          // Display nutrition info
          if (userData.profile && userData.preferences) {
            const nutritionPlan = calculateNutrition({
              ...userData.profile,
              preferences: userData.preferences
            });
            
            document.getElementById('nutritionInfo').innerHTML = `
              <div class="meta-info">
                <div class="meta-item"><strong>Calories:</strong> ${nutritionPlan.calories} kcal/day</div>
                <div class="meta-item"><strong>Protein:</strong> ${nutritionPlan.protein}g/day</div>
                <div class="meta-item"><strong>Carbs:</strong> ${nutritionPlan.carbs}g/day</div>
                <div class="meta-item"><strong>Fats:</strong> ${nutritionPlan.fats}g/day</div>
              </div>
              <p>These recommendations are based on your profile information and fitness goals.</p>
            `;
          }
          
          // Display workout plan
          if (userData.workoutPlan) {
            const workoutContainer = document.getElementById('workoutPlanContainer');
            userData.workoutPlan.forEach(workout => {
              const dayElement = document.createElement('div');
              dayElement.className = 'workout-day';
              dayElement.innerHTML = `
                <h2>${workout.day.charAt(0).toUpperCase() + workout.day.slice(1)}: ${workout.type}</h2>
                <div class="meta-info">
                  <div class="meta-item"><strong>Duration:</strong> ${workout.duration}</div>
                  <div class="meta-item"><strong>Rest:</strong> ${workout.restBetweenSets}</div>
                </div>
                <div class="exercise-list">
                  <h3>Exercises</h3>
                  ${workout.exercises.map(ex => `<div class="exercise">${ex}</div>`).join('')}
                </div>
              `;
              workoutContainer.appendChild(dayElement);
            });
          } else {
            workoutContainer.innerHTML = `<p>No workout plan generated yet. Please complete your profile first.</p>`;
          }
        }
      } else {
        window.location.href = "login.html";
      }
    });
  </script>
</body>
</html>
